            <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:i<3?14:0}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:'#6366f1',flexShrink:0}}/>
              <span style={{fontSize:14,color:'rgba(255,255,255,0.7)',fontWeight:500}}>{s}</span>
            </div>
          ))}
          <div style={{marginTop:24,padding:'12px 0',borderTop:'1px solid rgba(255,255,255,0.08)',display:'flex',justifyContent:'center'}}>
            <span style={{fontSize:13,fontWeight:700,color:'#818cf8'}}>Free discovery call →</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   CANVAS APP
══════════════════════════════════════════════════ */

function Artboard({ label, width, height, scale = 0.35, children }) {
  return (
    <div className="artboard-wrap">
      <div className="artboard-label">{label} <span style={{opacity:0.5}}>({width}×{height})</span></div>
      <div className="artboard-frame" style={{width: width*scale, height: height*scale}}>
        <div style={{transform:`scale(${scale})`, transformOrigin:'top left', width, height, flexShrink:0}}>
          {children}
        </div>
      </div>
    </div>
  );
}

function App() {
  return (
    <div id="canvas-app">
      <div className="canvas-header">
        <div className="canvas-title">Zimplixio — Social Media Graphics</div>
        <div className="canvas-subtitle">7 templates across LinkedIn, Instagram, and Twitter/X · All at production dimensions</div>
      </div>

      <div className="section-group">
        <div className="section-label">LinkedIn</div>
        <div className="artboards-row">
          <Artboard label="Post — Dark Hero" width={1200} height={627} scale={0.36}>
            <LinkedInPostA />
          </Artboard>
          <Artboard label="Post — Thought Leadership" width={1200} height={627} scale={0.36}>
            <LinkedInPostB />
          </Artboard>
          <Artboard label="Profile Banner" width={1584} height={396} scale={0.36}>
            <LinkedInBanner />
          </Artboard>
        </div>
      </div>

      <div className="section-group">
        <div className="section-label">Instagram</div>
        <div className="artboards-row">
          <Artboard label="Square Post — Brand" width={1080} height={1080} scale={0.3}>
            <InstagramSquareA />
          </Artboard>
          <Artboard label="Square Post — AI Framework" width={1080} height={1080} scale={0.3}>
            <InstagramSquareB />
          </Artboard>
          <Artboard label="Story" width={1080} height={1920} scale={0.22}>
            <InstagramStory />
          </Artboard>
        </div>
      </div>

      <div className="section-group">
        <div className="section-label">Twitter / X</div>
        <div className="artboards-row">
          <Artboard label="Link Card" width={1200} height={675} scale={0.36}>
            <TwitterCard />
          </Artboard>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
